# CI：格式检查 + 多平台构建（Linux/Windows）
name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'NOTICE'
      - 'READEME_zh'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'NOTICE'
      - 'READEME_zh'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  format:
    name: 格式检查
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: 安装 clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: 检查代码格式
        run: bash scripts/format_check.sh

  build-and-test:
    name: 构建与测试
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            qt6-base-dev \
            qt6-declarative-dev \
            libtorrent-rasterbar-dev

      - name: 配置与构建（含测试）
        run: bash scripts/build.sh

  build-windows:
    name: Windows 构建与测试
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: 安装 Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.2"
          host: windows
          target: desktop
          cache: true

      - name: 缓存 vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg
            ~\AppData\Local\vcpkg\archives
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: 安装 libtorrent（vcpkg）
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          if (-not (Test-Path C:/vcpkg/.git)) {
            git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          }
          & C:/vcpkg/bootstrap-vcpkg.bat -disableMetrics
          # Manifest 模式：依赖见仓库根目录 vcpkg.json，不得再传包名参数
          & C:/vcpkg/vcpkg.exe install --triplet x64-windows

      - name: 配置（Windows，含测试）
        shell: pwsh
        run: |
          $qtRoot = $null
          if ($env:QT_ROOT_DIR -and (Test-Path -LiteralPath $env:QT_ROOT_DIR)) {
            $qtRoot = $env:QT_ROOT_DIR
          } elseif ($env:Qt6_DIR -and (Test-Path -LiteralPath $env:Qt6_DIR)) {
            $qtRoot = (Get-Item -LiteralPath $env:Qt6_DIR).Parent.Parent.Parent.FullName
          }
          if (-not $qtRoot) {
            Write-Error "Set QT_ROOT_DIR or Qt6_DIR for CMAKE_PREFIX_PATH (install-qt-action usually sets one)."
            exit 1
          }
          cmake -S . -B build-win `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_TESTING=ON `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_PREFIX_PATH="$qtRoot"

      - name: 构建（Windows）
        run: cmake --build build-win --config Release --parallel

      - name: 测试（Windows）
        run: ctest --test-dir build-win --output-on-failure -C Release
